<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Egg Pet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="device" aria-label="Virtual pet device">
      <header class="topbar">
        <h1 id="title">Egg Hatchery</h1>
        <div class="meta" id="meta"></div>
      </header>

      <div class="screen">
        <pre id="sprite" class="sprite">(choose an egg)</pre>

        <div class="stats" id="stats">
          <!-- filled by JS -->
        </div>

        <div class="log" id="log"></div>
      </div>

      <div class="controls">
        <div class="row">
          <label class="label">
            Egg:
            <select id="egg">
              <option value="">Choose…</option>
              <option value="fish">Fish</option>
              <option value="reptile">Reptile</option>
              <option value="mammal">Mammal</option>
              <option value="insect">Insect</option>
              <option value="mollusc">Mollusc</option>
              <option value="fungi">Fungi</option>
              <option value="bird">Bird</option>
              <option value="amphibian">Amphibian</option>
            </select>
          </label>

          <button id="hatch">Hatch</button>
          <button id="reset" class="ghost">Reset</button>
        </div>

        <div class="row">
          <button id="feed">Feed</button>
          <button id="play">Play</button>
          <button id="sleep">Sleep</button>
          <button id="clean">Clean</button>
          <button id="medicate">Medicate</button>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>Tip: keep stats high to get the “good” adult form.</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
